<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Tabs · Rohit Tabs</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #E24B4A; --red-bg: #FCEBEB; --red-border: #F7C1C1;
    --blue-tag: #185FA5; --blue-bg: #E6F1FB;
    --green-tag: #3B6D11; --green-bg: #EAF3DE;
    --purple-tag: #534AB7; --purple-bg: #EEEDFE; --purple-border: #AFA9EC;
    --teal-tag: #0F6E56; --teal-bg: #E1F5EE; --teal-border: #9FE1CB;
    --amber-tag: #854F0B; --amber-bg: #FAEEDA; --amber-border: #FAC775;
    --wa: #25D366;
    --text: #1a1a1a; --text-2: #555; --text-3: #888;
    --bg: #f5f5f3; --card: #fff;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18);
    --radius: 8px;
  }
  html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color-scheme: light; }
  body { background: var(--bg); color: var(--text); }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo img { height: 32px; width: auto; }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); }
  .logo-text .red { color: var(--red); }
  .back-btn { font-size: 13px; color: var(--text-2); text-decoration: none; }
  .back-btn:hover { color: var(--text); }
  .hero { padding: 32px 28px 24px; }
  .s-label { font-size: 11px; color: var(--text-3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
  .hero h1 { font-size: 30px; font-weight: 800; color: var(--text); letter-spacing: -1px; margin-bottom: 6px; }
  .hero h1 em { font-style: normal; color: var(--red); }
  .hero p { font-size: 13px; color: var(--text-3); margin-bottom: 20px; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-input { flex: 1; padding: 10px 16px; border: 0.5px solid var(--border-strong); border-radius: 24px; font-size: 14px; background: var(--card); color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--red); }
  .search-input::placeholder { color: var(--text-3); }
  .search-clear { background: none; border: none; color: var(--text-3); font-size: 18px; cursor: pointer; padding: 0 4px; display: none; }
  .search-clear.visible { display: block; }
  .divider { height: 0.5px; background: var(--border); margin: 0 28px; }
  .section { padding: 24px 28px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .song-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
  .song-card:hover { border-color: var(--border-strong); }
  .song-card:active { transform: scale(0.98); }
  .song-card.selected { border-color: var(--red); border-width: 1.5px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 11px; }
  .tag { font-size: 11px; border-radius: 10px; padding: 3px 9px; font-weight: 500; color: var(--blue-tag); background: var(--blue-bg); }
  .see-sample-btn { font-size: 11px; color: var(--red); background: none; border: none; cursor: pointer; padding: 0; }
  .song-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .song-movie { font-size: 11px; color: var(--text-3); margin-bottom: 6px; }
  .song-style { font-size: 11px; color: var(--text-2); margin-bottom: 10px; }
  .asset-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 11px; }
  .ap { font-size: 10px; padding: 2px 7px; border-radius: 8px; border: 0.5px solid var(--border); }
  .ap-pdf    { color: var(--purple-tag); background: var(--purple-bg); border-color: var(--purple-border); }
  .ap-tracks { color: var(--teal-tag);   background: var(--teal-bg);   border-color: var(--teal-border); }
  .ap-gp     { color: var(--amber-tag);  background: var(--amber-bg);  border-color: var(--amber-border); }
  .card-foot { display: flex; justify-content: space-between; align-items: center; }
  .from-price { font-size: 12px; color: var(--text-3); }
  .from-price strong { font-size: 15px; font-weight: 600; color: var(--text); }
  .detail-panel { background: var(--card); border: 0.5px solid var(--border); border-radius: 14px; padding: 22px; margin-top: 16px; }
  .d-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .d-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .d-sub { font-size: 12px; color: var(--text-3); }
  .close-btn { font-size: 22px; color: var(--text-3); background: none; border: none; cursor: pointer; line-height: 1; }
  .sample-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; cursor: pointer; }
  .sample-overlay img { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; cursor: default; }
  .sample-thumb { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; cursor: pointer; position: relative; }
  .sample-thumb img { width: 100%; max-height: 160px; object-fit: cover; display: block; }
  .sample-thumb-label { position: absolute; bottom: 8px; right: 10px; font-size: 11px; background: rgba(0,0,0,0.6); color: #fff; padding: 3px 8px; border-radius: 10px; }
  .sample-placeholder { padding: 24px; text-align: center; font-size: 13px; color: var(--text-3); }
  .preview-player { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .play-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .preview-label { font-size: 12px; font-weight: 500; color: var(--text); }
  .preview-note { font-size: 11px; color: var(--text-3); }
  audio { display: none; }
  .choose-label { font-size: 12px; color: var(--text-3); margin-bottom: 10px; }
  .asset-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .a-row { display: flex; align-items: center; gap: 12px; padding: 13px 15px; border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; }
  .a-row:hover { border-color: var(--border-strong); }
  .a-row.on { border-color: var(--red); background: var(--red-bg); }
  .a-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--red); flex-shrink: 0; cursor: pointer; }
  .a-info { flex: 1; }
  .a-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .a-meta { font-size: 11px; color: var(--text-2); margin-top: 2px; }
  .a-price { font-size: 14px; font-weight: 600; color: var(--text); }
  .bundle-divider { height: 0.5px; background: var(--border); margin: 4px 0; }
  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-top: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); margin-bottom: 14px; }
  .total-row span { font-size: 13px; color: var(--text-2); }
  .total-row strong { font-size: 20px; font-weight: 600; color: var(--text); }
  .order-fields { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .order-fields input { flex: 1; min-width: 130px; padding: 10px 13px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; background: var(--bg); color: var(--text); }
  .order-fields input:focus { outline: none; border-color: var(--red); }
  .wa-btn { width: 100%; background: var(--wa); color: #fff; border: none; border-radius: 24px; padding: 13px; font-size: 15px; cursor: pointer; margin-bottom: 8px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .or-row { text-align: center; font-size: 12px; color: var(--text-3); margin: 6px 0; }
  .em-btn { width: 100%; background: var(--text); color: var(--bg); border: none; border-radius: 24px; padding: 13px; font-size: 15px; cursor: pointer; font-weight: 500; }
  .empty { text-align: center; padding: 40px; color: var(--text-3); font-size: 14px; }
  footer { background: var(--card); border-top: 0.5px solid var(--border); padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
  footer p { font-size: 13px; color: var(--text-2); }
  .foot-link { font-size: 13px; color: var(--text-3); text-decoration: none; display: flex; align-items: center; gap: 5px; }
  .foot-link:hover { color: var(--text); }
  @media (max-width: 600px) { nav { padding: 14px 16px; } .hero, .section { padding: 20px 16px; } .divider { margin: 0 16px; } footer { padding: 16px; } }
</style>
