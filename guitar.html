<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #E24B4A; --red-bg: #FCEBEB; --red-border: #F7C1C1;
    --blue-tag: #185FA5; --blue-bg: #E6F1FB;
    --green-tag: #3B6D11; --green-bg: #EAF3DE;
    --purple-tag: #534AB7; --purple-bg: #EEEDFE; --purple-border: #AFA9EC;
    --teal-tag: #0F6E56; --teal-bg: #E1F5EE; --teal-border: #9FE1CB;
    --amber-tag: #854F0B; --amber-bg: #FAEEDA; --amber-border: #FAC775;
    --wa: #25D366;
    --text: #1a1a1a; --text-2: #555; --text-3: #888;
    --bg: #f5f5f3; --card: #fff;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18);
    --radius: 8px;
  }
  html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color-scheme: light; }
  body { background: var(--bg); color: var(--text); }
  nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo img { height: 32px; width: auto; }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); }
  .logo-text .red { color: var(--red); }
  .back-btn { font-size: 13px; color: var(--text-2); text-decoration: none; }
  .back-btn:hover { color: var(--text); }
  .hero { padding: 32px 28px 24px; }
  .s-label { font-size: 11px; color: var(--text-3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
  .hero h1 { font-size: 30px; font-weight: 800; color: var(--text); letter-spacing: -1px; margin-bottom: 6px; }
  .hero h1 em { font-style: normal; color: var(--red); }
  .hero p { font-size: 13px; color: var(--text-3); margin-bottom: 20px; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-input { flex: 1; padding: 10px 16px; border: 0.5px solid var(--border-strong); border-radius: 24px; font-size: 14px; background: var(--card); color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--red); }
  .search-input::placeholder { color: var(--text-3); }
  .search-clear { background: none; border: none; color: var(--text-3); font-size: 18px; cursor: pointer; padding: 0 4px; display: none; }
  .search-clear.visible { display: block; }
  .divider { height: 0.5px; background: var(--border); margin: 0 28px; }
  .section { padding: 24px 28px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .song-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 14px; padding: 18px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; }
  .song-card:hover { border-color: var(--border-strong); }
  .song-card:active { transform: scale(0.98); }
  .song-card.selected { border-color: var(--red); border-width: 1.5px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 11px; }
  .tag { font-size: 11px; border-radius: 10px; padding: 3px 9px; font-weight: 500; color: var(--blue-tag); background: var(--blue-bg); }
  .see-sample-btn { font-size: 11px; color: var(--red); background: none; border: none; cursor: pointer; padding: 0; }
  .song-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .song-movie { font-size: 11px; color: var(--text-3); margin-bottom: 6px; }
  .song-style { font-size: 11px; color: var(--text-2); margin-bottom: 10px; }
  .asset-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 11px; }
  .ap { font-size: 10px; padding: 2px 7px; border-radius: 8px; border: 0.5px solid var(--border); }
  .ap-pdf    { color: var(--purple-tag); background: var(--purple-bg); border-color: var(--purple-border); }
  .ap-tracks { color: var(--teal-tag);   background: var(--teal-bg);   border-color: var(--teal-border); }
  .ap-gp     { color: var(--amber-tag);  background: var(--amber-bg);  border-color: var(--amber-border); }
  .card-foot { display: flex; justify-content: space-between; align-items: center; }
  .from-price { font-size: 12px; color: var(--text-3); }
  .from-price strong { font-size: 15px; font-weight: 600; color: var(--text); }
  .detail-panel { background: var(--card); border: 0.5px solid var(--border); border-radius: 14px; padding: 22px; margin-top: 16px; }
  .d-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .d-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .d-sub { font-size: 12px; color: var(--text-3); }
  .close-btn { font-size: 22px; color: var(--text-3); background: none; border: none; cursor: pointer; line-height: 1; }
  .sample-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; cursor: pointer; }
  .sample-overlay img { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; cursor: default; }
  .sample-thumb { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 16px; cursor: pointer; position: relative; }
  .sample-thumb img { width: 100%; max-height: 160px; object-fit: cover; display: block; }
  .sample-thumb-label { position: absolute; bottom: 8px; right: 10px; font-size: 11px; background: rgba(0,0,0,0.6); color: #fff; padding: 3px 8px; border-radius: 10px; }
  .sample-placeholder { padding: 24px; text-align: center; font-size: 13px; color: var(--text-3); }
  .preview-player { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .play-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .preview-label { font-size: 12px; font-weight: 500; color: var(--text); }
  .preview-note { font-size: 11px; color: var(--text-3); }
  audio { display: none; }
  .choose-label { font-size: 12px; color: var(--text-3); margin-bottom: 10px; }
  .asset-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .a-row { display: flex; align-items: center; gap: 12px; padding: 13px 15px; border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; }
  .a-row:hover { border-color: var(--border-strong); }
  .a-row.on { border-color: var(--red); background: var(--red-bg); }
  .a-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--red); flex-shrink: 0; cursor: pointer; }
  .a-info { flex: 1; }
  .a-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .a-meta { font-size: 11px; color: var(--text-2); margin-top: 2px; }
  .a-price { font-size: 14px; font-weight: 600; color: var(--text); }
  .bundle-divider { height: 0.5px; background: var(--border); margin: 4px 0; }
  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-top: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); margin-bottom: 14px; }
  .total-row span { font-size: 13px; color: var(--text-2); }
  .total-row strong { font-size: 20px; font-weight: 600; color: var(--text); }
  .order-fields { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .order-fields input { flex: 1; min-width: 130px; padding: 10px 13px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; background: var(--bg); color: var(--text); }
  .order-fields input:focus { outline: none; border-color: var(--red); }
  .wa-btn { width: 100%; background: var(--wa); color: #fff; border: none; border-radius: 24px; padding: 13px; font-size: 15px; cursor: pointer; margin-bottom: 8px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .or-row { text-align: center; font-size: 12px; color: var(--text-3); margin: 6px 0; }
  .em-btn { width: 100%; background: var(--text); color: var(--bg); border: none; border-radius: 24px; padding: 13px; font-size: 15px; cursor: pointer; font-weight: 500; }
  .empty { text-align: center; padding: 40px; color: var(--text-3); font-size: 14px; }
  footer { background: var(--card); border-top: 0.5px solid var(--border); padding: 16px 28px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; overflow: hidden; }
  .foot-left { font-size: 13px; color: var(--text-2); }
  .foot-left strong { color: var(--text); font-weight: 600; display: block; margin-bottom: 2px; }
  .foot-center { display: flex; justify-content: center; overflow: hidden; }
  .foot-center img { height: 120px; width: auto; margin: -30px 0; }
  .foot-links { display: flex; justify-content: flex-end; gap: 16px; }
  .foot-link { font-size: 13px; color: var(--text-3); text-decoration: none; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .foot-link:hover { color: var(--text); }
  @media (max-width: 600px) {
    nav { padding: 14px 16px; }
    .hero, .section { padding: 20px 16px; }
    .divider { margin: 0 16px; }
    footer { grid-template-columns: 1fr; text-align: center; padding: 14px 16px; overflow: hidden; }
    .foot-center img { height: 90px; margin: -22px 0; }
    .foot-links { justify-content: center; }
  }
</style>

const WA_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;
let songs = [], searchQuery = '', selectedSong = null, checked = {pdf:false,tracks:false,gp:false,bundle:false}, audioEl = null, isPlaying = false;
async function loadSongs() { const r = await fetch('songs.json'); const all = await r.json(); songs = all.filter(s => s.type === INSTRUMENT); renderGrid(); }
function minPrice(s) { return Math.min(...Object.values(s.assets).map(a => a.price)); }
function pillsHTML(s) { let h=''; if(s.assets.pdf) h+='<span class="ap ap-pdf">PDF</span>'; if(s.assets.tracks) h+='<span class="ap ap-tracks">Tracks</span>'; if(s.assets.gp) h+='<span class="ap ap-gp">Guitar Pro</span>'; return h; }
function renderGrid() {
  const q = searchQuery.toLowerCase();
  const list = searchQuery ? songs.filter(s => s.title.toLowerCase().includes(q) || s.movie.toLowerCase().includes(q)) : songs;
  const grid = document.getElementById('cards-grid');
  if (!list.length) { grid.innerHTML = `<div class="empty">${searchQuery ? 'No songs found for "'+searchQuery+'"' : 'No guitar tabs yet, check back soon.'}</div>`; return; }
  grid.innerHTML = list.map(s => `
    <div class="song-card${selectedSong&&selectedSong.id===s.id?' selected':''}" onclick="openDetail(${s.id})">
      <div class="card-top"><span class="tag">Guitar</span>${s.sample?`<button class="see-sample-btn" onclick="event.stopPropagation();openDetail(${s.id})">👁 See sample</button>`:''}</div>

}
function onSearch(v) { searchQuery=v.trim(); document.getElementById('search-clear').classList.toggle('visible',searchQuery.length>0); selectedSong=null; document.getElementById('detail-panel').innerHTML=''; renderGrid(); }
function clearSearch() { document.getElementById('search-input').value=''; onSearch(''); }
function calcTotal() { if(!selectedSong) return 0; let t=0; if(checked.pdf&&selectedSong.assets.pdf) t+=selectedSong.assets.pdf.price; if(checked.tracks&&selectedSong.assets.tracks) t+=selectedSong.assets.tracks.price; if(checked.gp&&selectedSong.assets.gp) t+=selectedSong.assets.gp.price; if(checked.bundle&&selectedSong.assets.bundle) t+=selectedSong.assets.bundle.price; return t; }
function updateTotal() { const el=document.getElementById('order-total'); if(el) el.textContent='₹'+calcTotal(); }
function toggleAsset(k) { checked[k]=!checked[k]; const row=document.getElementById('arow-'+k); const cb=document.getElementById('cb-'+k); if(row) row.classList.toggle('on',checked[k]); if(cb) cb.checked=checked[k]; updateTotal(); }
function assetRowHTML(key,label,saving='') { const a=selectedSong.assets[key]; if(!a) return ''; let meta=key==='pdf'?`${a.pages} page${a.pages!==1?'s':''} · ${a.note}`:a.note; const badge=saving?`<span style="font-size:10px;background:#E1F5EE;color:#0F6E56;border:0.5px solid #9FE1CB;border-radius:8px;padding:2px 7px;margin-left:6px;">${saving}</span>`:''; return `<div class="a-row" id="arow-${key}" onclick="toggleAsset('${key}')"><input type="checkbox" id="cb-${key}" onclick="event.stopPropagation();toggleAsset('${key}')"><div class="a-info"><div class="a-name">${label}${badge}</div><div class="a-meta">${meta}</div></div><div class="a-price">₹${a.price}</div></div>`; }
function stopAudio() { if(audioEl){audioEl.pause();audioEl.currentTime=0;} isPlaying=false; const b=document.getElementById('play-btn'); if(b) b.textContent='▶'; }
function togglePlay() { if(!audioEl) return; if(isPlaying){audioEl.pause();isPlaying=false;document.getElementById('play-btn').textContent='▶';}else{audioEl.play();isPlaying=true;document.getElementById('play-btn').textContent='⏸';} }
function openDetail(id) {
  stopAudio(); selectedSong=songs.find(s=>s.id===id); checked={pdf:false,tracks:false,gp:false,bundle:false}; renderGrid();
  const sampleBlock=selectedSong.sample?`<div class="sample-thumb" onclick="openSampleOverlay('${selectedSong.sample}')"><img src="${selectedSong.sample}" alt="Sample" onerror="this.parentElement.innerHTML='<div class=\\'sample-placeholder\\'>Sample loads from your repo</div>'"><span class="sample-thumb-label">Tap to enlarge</span></div>`:'';
  const previewBlock=selectedSong.preview?`<div class="preview-player"><button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button><div><div class="preview-label">Preview</div><div class="preview-note">Short clip, get a feel for the arrangement</div></div><audio id="preview-audio" src="${selectedSong.preview}" onended="stopAudio()"></audio></div>`:'';
  const bundleRow=selectedSong.assets.bundle?(()=>{const ind=(selectedSong.assets.pdf?selectedSong.assets.pdf.price:0)+(selectedSong.assets.tracks?selectedSong.assets.tracks.price:0)+(selectedSong.assets.gp?selectedSong.assets.gp.price:0);const sav=ind-selectedSong.assets.bundle.price;return '<div class="bundle-divider"></div>'+assetRowHTML('bundle','Full bundle',sav>0?`Save ₹${sav}`:'');})():'';
  document.getElementById('detail-panel').innerHTML=`<div class="detail-panel"><div class="d-head"><div><div class="d-title">${selectedSong.title}</div><div class="d-sub">${selectedSong.movie} · Guitar · ${selectedSong.style}</div></div><button class="close-btn" onclick="closeDetail()">×</button></div>${sampleBlock}${previewBlock}<div class="choose-label">Choose what you want</div><div class="asset-rows">${assetRowHTML('pdf','PDF, staff notation and tabs')}${assetRowHTML('tracks','Track and backing track')}${assetRowHTML('gp','Guitar Pro file (.gp)')}${bundleRow}</div><div class="total-row"><span>Total</span><strong id="order-total">₹0</strong></div><div class="order-fields"><input type="text" id="inp-name" placeholder="Your name"><input type="email" id="inp-email" placeholder="Email address"></div><button class="wa-btn" onclick="sendWhatsApp()">${WA_SVG} Send order via WhatsApp</button><div class="or-row">or</div><button class="em-btn" onclick="sendEmail()">✉ Send order via email</button></div>`;
  audioEl=document.getElementById('preview-audio');
  document.getElementById('detail-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closeDetail() { stopAudio(); selectedSong=null; checked={pdf:false,tracks:false,gp:false,bundle:false}; renderGrid(); document.getElementById('detail-panel').innerHTML=''; }
function openSampleOverlay(src) { document.getElementById('overlay-img').src=src; document.getElementById('sample-overlay').style.display='flex'; document.body.style.overflow='hidden'; }
function closeSampleOverlay() { document.getElementById('sample-overlay').style.display='none'; document.body.style.overflow=''; }
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSampleOverlay();});
function buildOrder() { const name=(document.getElementById('inp-name')?.value||'').trim()||'not provided'; const email=(document.getElementById('inp-email')?.value||'').trim()||'not provided'; const items=[]; if(checked.pdf&&selectedSong.assets.pdf) items.push(`PDF ₹${selectedSong.assets.pdf.price}`); if(checked.tracks&&selectedSong.assets.tracks) items.push(`Track and backing track ₹${selectedSong.assets.tracks.price}`); if(checked.gp&&selectedSong.assets.gp) items.push(`Guitar Pro file ₹${selectedSong.assets.gp.price}`); if(checked.bundle&&selectedSong.assets.bundle) items.push(`Full bundle ₹${selectedSong.assets.bundle.price}`); return {name,email,items,total:calcTotal()}; }
function sendWhatsApp() { const o=buildOrder(); if(!o.items.length){alert('Please select at least one item.');return;} const text=`Hi Rohit!\n\nOrder request:\nSong: ${selectedSong.title} (Guitar)\nItems: ${o.items.join(', ')}\nTotal: ₹${o.total}\nName: ${o.name}\nEmail: ${o.email}\n\nPlease send the UPI QR. Thanks!`; window.open(`https://wa.me/${YOUR_WHATSAPP}?text=${encodeURIComponent(text)}`,'_blank'); }
function sendEmail() { const o=buildOrder(); if(!o.items.length){alert('Please select at least one item.');return;} const sub=`Tab order: ${selectedSong.title}`; const body=`Hi Rohit,\n\nOrder request:\nSong: ${selectedSong.title} (Guitar)\nItems: ${o.items.join(', ')}\nTotal: ₹${o.total}\nName: ${o.name}\nReply to: ${o.email}\n\nPlease send the UPI QR. Thanks!`; window.open(`mailto:${YOUR_EMAIL}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`,'_blank'); }
loadSongs();
</script>
</body>
</html>
