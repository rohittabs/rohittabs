<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metronome · Rohit Tabs</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #E24B4A; --red-bg: #FCEBEB;
    --text: #1a1a1a; --text-2: #555; --text-3: #888;
    --bg: #f5f5f3; --card: #fff;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.18);
  }
  html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color-scheme: light; }
  body { background: var(--bg); color: var(--text); min-height: 100vh; }

  nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; border-bottom: 0.5px solid var(--border); background: var(--bg); }
  .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .logo img { height: 32px; width: auto; }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; color: var(--text); }
  .logo-text .red { color: var(--red); }
  .back-btn { font-size: 13px; color: var(--text-2); text-decoration: none; }
  .back-btn:hover { color: var(--text); }

  .metro-wrap { max-width: 520px; margin: 0 auto; padding: 36px 24px 48px; }

  .hero { text-align: center; margin-bottom: 36px; }
  .hero .s-label { font-size: 11px; color: var(--text-3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
  .hero h1 { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.8px; margin-bottom: 4px; }
  .hero h1 em { font-style: normal; color: var(--red); }
  .hero p { font-size: 13px; color: var(--text-3); }

  .beat-display { display: flex; justify-content: center; gap: 10px; margin-bottom: 32px; }
  .beat-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); border: 0.5px solid var(--border-strong); transition: background 0.05s, transform 0.05s; }
  .beat-dot.accent { background: var(--red); transform: scale(1.3); }
  .beat-dot.on { background: var(--text); transform: scale(1.2); }

  .bpm-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 14px; }
  .bpm-display { text-align: center; margin-bottom: 16px; }
  .bpm-number { font-size: 72px; font-weight: 900; color: var(--text); letter-spacing: -4px; line-height: 1; }
  .bpm-label { font-size: 13px; color: var(--text-3); margin-top: 2px; }
  .bpm-slider { width: 100%; accent-color: var(--red); height: 4px; margin-bottom: 14px; cursor: pointer; }
  .bpm-btns { display: flex; gap: 8px; justify-content: center; }
  .bpm-btn { width: 40px; height: 40px; border-radius: 50%; border: 0.5px solid var(--border-strong); background: var(--bg); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .bpm-btn:hover { background: var(--text); color: var(--bg); }
  .bpm-input { width: 80px; padding: 8px; border: 0.5px solid var(--border-strong); border-radius: var(--radius, 8px); font-size: 16px; font-weight: 700; text-align: center; background: var(--bg); color: var(--text); }
  .bpm-input:focus { outline: none; border-color: var(--red); }

  .note-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 14px; }
  .note-label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; }
  .note-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .note-btn { padding: 10px 6px; border-radius: 10px; border: 0.5px solid var(--border-strong); background: var(--bg); color: var(--text); font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; line-height: 1.3; transition: all 0.12s; }
  .note-btn:hover { border-color: var(--text); }
  .note-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .note-btn .note-sym { display: flex; justify-content: center; align-items: center; height: 32px; margin-bottom: 4px; }
  .note-sym img { height: 30px; width: auto; display: block; }
  .note-btn.active .note-sym img { filter: invert(1); }

  .ts-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
  .ts-label { font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; }
  .ts-row { display: flex; align-items: center; gap: 10px; }
  .ts-btn { width: 34px; height: 34px; border-radius: 50%; border: 0.5px solid var(--border-strong); background: var(--bg); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .ts-btn:hover { background: var(--text); color: var(--bg); }
  .ts-val { font-size: 22px; font-weight: 800; color: var(--text); min-width: 28px; text-align: center; }
  .ts-sep { font-size: 22px; color: var(--text-3); }
  .ts-note-val { font-size: 14px; color: var(--text-2); font-weight: 500; }

  .tap-btn { width: 100%; padding: 14px; border-radius: 24px; border: 1.5px solid var(--border-strong); background: transparent; color: var(--text); font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 12px; letter-spacing: 0.2px; }
  .tap-btn:hover { background: var(--bg); }
  .tap-btn:active { transform: scale(0.98); }

  .start-btn { width: 100%; padding: 16px; border-radius: 24px; border: none; background: var(--text); color: var(--bg); font-size: 17px; font-weight: 800; cursor: pointer; letter-spacing: -0.3px; transition: all 0.15s; }
  .start-btn.running { background: var(--red); }
  .start-btn:hover { opacity: 0.9; }

  .tempo-name { text-align: center; font-size: 13px; color: var(--text-3); margin-top: 12px; font-style: italic; }

  footer { background: var(--card); border-top: 0.5px solid var(--border); padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
  footer p { font-size: 13px; color: var(--text-2); }
  .foot-link { font-size: 13px; color: var(--text-3); text-decoration: none; display: flex; align-items: center; gap: 5px; }
  .foot-link:hover { color: var(--text); }
  @media (max-width: 600px) { nav { padding: 14px 16px; } .metro-wrap { padding: 24px 16px 40px; } .note-grid { grid-template-columns: repeat(4, 1fr); } footer { padding: 16px; } }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo"><img src="logo.png" alt=""><span class="logo-text">rohit<span class="red">tabs</span></span></a>

<div class="metro-wrap">
  <div class="hero">
    <div class="s-label">Free tool</div>
    <h1>Metro<em>nome</em></h1>
    <p>Set your BPM and note value, then hit Start</p>
    <div style="margin-top:10px;font-size:12px;color:var(--text-3);background:var(--card);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;display:inline-block;">📵 iPhone users: turn off silent mode for sound</div>
  </div>

  <div class="beat-display" id="beat-display"></div>

  <div class="bpm-card">
    <div class="bpm-display">
      <div class="bpm-number" id="bpm-display">120</div>

    <div class="bpm-btns">
      <button class="bpm-btn" onclick="changeBPM(-10)">−10</button>
      <button class="bpm-btn" onclick="changeBPM(-1)">−</button>
      <input type="number" class="bpm-input" id="bpm-input" value="120" min="20" max="300" oninput="setBPM(this.value)">
      <button class="bpm-btn" onclick="changeBPM(1)">+</button>
      <button class="bpm-btn" onclick="changeBPM(10)">+10</button>
    </div>
  </div>

  <div class="note-card">
    <div class="note-label">Note value</div>
    <div class="note-grid" id="note-grid">
      <button class="note-btn" data-mult="4" onclick="setNote(this)">
        <span class="note-sym"><img src="whole_note.png" alt="Whole note"></span>Whole
      </button>
      <button class="note-btn" data-mult="2" onclick="setNote(this)">
        <span class="note-sym"><img src="half_note.png" alt="Half note"></span>Half
      </button>
      <button class="note-btn active" data-mult="1" onclick="setNote(this)">
        <span class="note-sym"><img src="quarter_note.png" alt="Quarter note"></span>Quarter
      </button>
      <button class="note-btn" data-mult="0.5" onclick="setNote(this)">
        <span class="note-sym"><img src="eigth_note.png" alt="8th note"></span>8th
      </button>
      <button class="note-btn" data-mult="0.25" onclick="setNote(this)">
        <span class="note-sym"><img src="sixteenth_note.png" alt="16th note"></span>16th
      </button>
      <button class="note-btn" data-mult="3" onclick="setNote(this)">
        <span class="note-sym"><img src="dotted_half_note.png" alt="Dotted half note"></span>Dotted half
      </button>
      <button class="note-btn" data-mult="1.5" onclick="setNote(this)">
        <span class="note-sym"><img src="dotted_quarter_note.png" alt="Dotted quarter note"></span>Dotted quarter
      </button>
      <button class="note-btn" data-mult="0.75" onclick="setNote(this)">
        <span class="note-sym"><img src="dotted_eighth_note.png" alt="Dotted 8th note"></span>Dotted 8th
      </button>
    </div>
  </div>

  <div class="ts-card">
    <div class="ts-label">Beats per bar</div>
    <div class="ts-row">
      <button class="ts-btn" onclick="changeBeats(-1)">−</button>
      <div class="ts-val" id="beats-val">4</div>
      <button class="ts-btn" onclick="changeBeats(1)">+</button>
      <div class="ts-sep">/</div>
      <div class="ts-note-val">quarter note</div>
    </div>
  </div>

  <button class="tap-btn" id="tap-btn" onclick="tapTempo()">Tap tempo</button>
  <button class="start-btn" id="start-btn" onclick="toggleMetronome()">▶ Start</button>
  <div class="tempo-name" id="tempo-name">Moderato</div>
</div>

<div style="padding:16px 28px;"><div style="background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;"><div style="display:flex;align-items:center;gap:10px;"><div style="width:34px;height:34px;background:#E1F5EE;border:0.5px solid #9FE1CB;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="17" height="17" viewBox="0 0 24 24" fill="#0F6E56"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></div><div><div style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:2px;">Follow on WhatsApp</div><div style="font-size:12px;color:#888;">New tabs, freebies and updates on WhatsApp</div></div></div><a href="https://whatsapp.com/channel/0029VbDV9fVHFxP1eTtWim39" target="_blank" style="background:transparent;color:#0F6E56;border:0.5px solid #9FE1CB;border-radius:22px;padding:8px 16px;font-size:13px;font-weight:600;text-decoration:none;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;"><svg width="14" height="14" viewBox="0 0 24 24" fill="#0F6E56"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Follow channel</a></div></div>
<script>
let bpm = 120;
let noteMult = 1;
let beats = 4;
let isRunning = false;
let currentBeat = 0;
let intervalId = null;
let audioCtx = null;
let tapTimes = [];
let tapResetTimer = null;

function computeIntervalMs(bpmVal, mult) {
  return (60000 / bpmVal) * mult;
}

function tempoName(bpmVal) {
  if (bpmVal < 40) return 'Larghissimo';
  if (bpmVal < 60) return 'Grave';
  if (bpmVal < 66) return 'Largo';
  if (bpmVal < 76) return 'Adagio';
  if (bpmVal < 108) return 'Andante';
  if (bpmVal < 120) return 'Moderato';
  if (bpmVal < 156) return 'Allegro';
  if (bpmVal < 176) return 'Vivace';
  if (bpmVal < 200) return 'Presto';
  return 'Prestissimo';
}

function clampBpm(v) {
  v = Math.round(Number(v));
  if (isNaN(v)) v = 120;
  return Math.max(20, Math.min(300, v));
}

function setBPM(val) {
  bpm = clampBpm(val);
  document.getElementById('bpm-display').textContent = bpm;
  document.getElementById('bpm-slider').value = bpm;
  document.getElementById('bpm-input').value = bpm;
  document.getElementById('tempo-name').textContent = tempoName(bpm);
  if (isRunning) restartTimer();
}

function changeBPM(delta) {
  setBPM(bpm + delta);
}

function setNote(btn) {
  document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  noteMult = parseFloat(btn.dataset.mult);
  if (isRunning) restartTimer();
}

function buildBeatDisplay() {
  const container = document.getElementById('beat-display');
  container.innerHTML = '';
  for (let i = 0; i < beats; i++) {
    const dot = document.createElement('div');
    dot.className = 'beat-dot';
    container.appendChild(dot);
  }
}

function changeBeats(delta) {
  beats = Math.max(1, Math.min(12, beats + delta));
  document.getElementById('beats-val').textContent = beats;
  buildBeatDisplay();
  if (isRunning) currentBeat = 0;
}

function ensureAudioContext() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function playClick(accent) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = accent ? 1500 : 1000;
  gain.gain.setValueAtTime(0.001, now);
  gain.gain.exponentialRampToValueAtTime(1, now + 0.001);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.06);
}

function tick() {
  const dots = document.querySelectorAll('.beat-dot');
  dots.forEach(d => d.classList.remove('on', 'accent'));
  const dot = dots[currentBeat];
  if (dot) dot.classList.add(currentBeat === 0 ? 'accent' : 'on');
  playClick(currentBeat === 0);
  currentBeat = (currentBeat + 1) % beats;
}

function startTimer() {
  const interval = computeIntervalMs(bpm, noteMult);
  currentBeat = 0;
  tick();
  intervalId = setInterval(tick, interval);
}

function stopTimer() {
  clearInterval(intervalId);
  intervalId = null;
  document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('on', 'accent'));
}

function restartTimer() {
  if (intervalId) {
    clearInterval(intervalId);
    startTimer();
  }
}

function toggleMetronome() {
  const btn = document.getElementById('start-btn');
  if (isRunning) {
    isRunning = false;
    stopTimer();
    btn.textContent = '▶ Start';
    btn.classList.remove('running');
  } else {
    ensureAudioContext();
    isRunning = true;
    startTimer();
    btn.textContent = '■ Stop';
    btn.classList.add('running');
  }
}

function tapTempo() {
  ensureAudioContext();
  const now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > 6) tapTimes.shift();
  clearTimeout(tapResetTimer);
  tapResetTimer = setTimeout(() => { tapTimes = []; }, 2000);
  if (tapTimes.length < 2) return;
  const intervals = [];
  for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i - 1]);
  const avgMs = intervals.reduce((a, b) => a + b, 0) / intervals.length;
  setBPM(Math.round(60000 / avgMs));
}

buildBeatDisplay();
document.getElementById('tempo-name').textContent = tempoName(bpm);
</script>
